# SonarQube Cloud analysis configuration.
# Analysis runs in CI (.github/workflows/sonar.yml) — coverage comes from
# Vitest's lcov output, so Automatic Analysis must stay OFF in SonarCloud.
sonar.projectKey=rashmisagar_trading-platform
sonar.organization=rashmisagar

sonar.sources=services/market-data/src,services/portfolio/src,services/trade/src,services/reg-reporting/src
sonar.tests=services/market-data/tests,services/portfolio/tests,services/trade/tests,services/reg-reporting/tests,tests/component,tests/e2e/tests,tests/performance

sonar.javascript.lcov.reportPaths=services/market-data/coverage/lcov.info,services/portfolio/coverage/lcov.info,services/trade/coverage/lcov.info,services/reg-reporting/coverage/lcov.info

# Entrypoints just wire env vars into the app factory — exercised by the
# component/e2e suites in containers, invisible to unit-level lcov.
sonar.coverage.exclusions=**/server.ts
